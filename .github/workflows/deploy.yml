name: Build, Push, and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Computex
          file: ./Computex/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/computex-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/computex-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./ComputexFrontend
          file: ./ComputexFrontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/computex-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/computex-frontend:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy with health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd Containerisation-React-Django-App

            LAST_GOOD_TAG_FILE=~/.last_good_tag
            if [ ! -f "$LAST_GOOD_TAG_FILE" ]; then
              echo "latest" > "$LAST_GOOD_TAG_FILE"
            fi
            PREVIOUS_TAG=$(cat "$LAST_GOOD_TAG_FILE")

            echo "Pulling latest images..."
            docker compose pull

            echo "Starting containers..."
            docker compose up -d

            echo "Waiting for containers to settle..."
            sleep 15

            echo "Running health check..."
            if curl -f -s -o /dev/null https://computex.jecintatechworks.com; then
              echo "Health check passed. Deploy successful."
              echo "${{ github.sha }}" > "$LAST_GOOD_TAG_FILE"
            else
              echo "Health check FAILED. Rolling back to previous image tag..."
              sed -i "s/:latest/:$PREVIOUS_TAG/" docker-compose.yml
              docker compose up -d
              sleep 15
              if curl -f -s -o /dev/null https://computex.jecintatechworks.com; then
                echo "Rollback successful. Site restored to previous version."
              else
                echo "CRITICAL: Rollback also failed. Manual intervention required."
                exit 1
              fi
            fi
