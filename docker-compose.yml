version: '3.9'

services:
  backend:
    container_name: django-app
    build: jessymi/Computex-backend:latest
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    container_name: react-app
    build: jessymi/Computex-Frontend:latest
    env_file:
    - .env
    ports:
      - "5173:5173"
    depends_on:
      - backend

  database:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - ddata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ddata:
